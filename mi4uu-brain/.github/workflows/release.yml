name: build-binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed by the release job

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: brain-md-linux-x64
            ext: ""
          - target: bun-linux-arm64
            artifact: brain-md-linux-arm64
            ext: ""
          - target: bun-darwin-x64
            artifact: brain-md-darwin-x64
            ext: ""
          - target: bun-darwin-arm64
            artifact: brain-md-darwin-arm64
            ext: ""
          - target: bun-windows-x64
            artifact: brain-md-windows-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin to a concrete version — `latest` makes setup-bun hit the
          # GitHub API to resolve the tag, which is rate-limited and
          # flakes with 404 on busy days (v0.2.1 first run lost arm64 +
          # windows-x64 to exactly that). Bump deliberately.
          bun-version: "1.3.14"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build web client (Vite)
        working-directory: web
        run: bun run build

      - name: Embed web bundle into the server tree
        # Scans web/dist/, overwrites server/src/web/assets.ts with a
        # module that imports every file using `with { type: "file" }`.
        # Those imports are what Bun's --compile picks up and bakes
        # into the resulting binary.
        run: bun scripts/gen-web-assets.ts

      - name: Compile single-binary for ${{ matrix.target }}
        run: |
          mkdir -p dist
          bun build \
            --compile \
            --minify \
            --sourcemap=none \
            --target=${{ matrix.target }} \
            --outfile=dist/${{ matrix.artifact }}${{ matrix.ext }} \
            server/src/index.ts

      - name: Inspect output
        run: ls -lh dist/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 30

      # Also publish the raw web bundle as a separate artifact — the
      # server's Tier-3 fallback downloads it when a source checkout has
      # no embedded assets and no local web/dist. Only one job needs to
      # upload it; the first one (linux-x64) does.
      - name: Upload web bundle (linux-x64 job only)
        if: matrix.target == 'bun-linux-x64'
        run: tar -czf web-dist.tar.gz -C web/dist .
      - name: Upload web-dist.tar.gz
        if: matrix.target == 'bun-linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.tar.gz
          if-no-files-found: error
          retention-days: 30

  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Show downloaded files
        run: ls -lh artifacts/
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
